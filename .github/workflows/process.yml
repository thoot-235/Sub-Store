name: Process-Subscriptions
on:
  # 定时触发：每天 UTC 时间 4:00 执行（北京时间中午12点）
  schedule:
    - cron: '0 4 * * *'
  # 手动触发
  workflow_dispatch:
jobs:
  merge:
    runs-on: ubuntu-latest
    steps:
      - name: Check-out-code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set-up-Python-environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 安装依赖
        run: |
          pip install requests pyyaml

      - name: Generate-consolidated-subscription
        run: python scripts/generate.py

      - name: Submit-update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 只提交生成的订阅文件
          git add merged.txt merged_base64.txt
          
          if git diff --staged --quiet; then
            echo "没有新变化，跳过提交"
          else
            git commit -m "Auto merge subscriptions $(date +'%Y-%m-%d %H:%M UTC')"
            git push
            echo "已提交更新"
          fi